<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinBiladi — Videos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brand: #b5432a;
    --brand-dark: #933522;
    --bg: #faf8f5;
    --text: #1a1a1a;
    --text-light: #555;
    --text-muted: #888;
    --border: #e8e4df;
    --card-bg: #fff;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Source Sans 3', 'Segoe UI', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── NAV ─── */
  .nav {
    display: flex; align-items: center; justify-content: center;
    padding: 14px 40px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1000;
  }
  .nav-brand {
    font-family: var(--serif); font-size: 30px; font-weight: 700;
    color: var(--brand); letter-spacing: .5px; cursor: pointer;
    transition: opacity .3s;
  }
  .nav-brand:hover { opacity: .8; }

  /* ─── HERO ─── */
  .hero {
    position: relative; width: 100%; height: 540px;
    overflow: hidden; background: #111;
  }
  .hero-img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .7s ease;
  }
  .hero:hover .hero-img { transform: scale(1.03); }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,.08) 0%, rgba(0,0,0,.55) 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; cursor: pointer;
  }
  .hero-tag {
    font-family: var(--sans); font-size: 13px;
    letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,.8);
  }
  .hero-title {
    font-size: 54px; font-weight: 700; color: #fff;
    text-shadow: 0 2px 24px rgba(0,0,0,.45);
    text-align: center; line-height: 1.12; max-width: 700px; padding: 0 20px;
  }
  .hero-play-btn {
    margin-top: 6px; transition: transform .35s;
  }
  .hero:hover .hero-play-btn { transform: scale(1.12); }

  .hero-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    opacity: .65; transition: opacity .3s; padding: 10px;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,.5));
  }
  .hero-arrow:hover { opacity: 1; }
  .hero-arrow.l { left: 18px; }
  .hero-arrow.r { right: 18px; }

  /* ─── TABS ─── */
  .tabs-wrap { text-align: center; padding: 36px 24px 0; }
  .tabs {
    display: inline-flex; gap: 32px;
    font-family: var(--sans); font-size: 15px;
  }
  .tab {
    cursor: pointer; padding-bottom: 6px;
    color: #999; border-bottom: 2px solid transparent;
    transition: all .3s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tabs-sub {
    font-family: var(--sans); font-size: 15px;
    color: var(--text-muted); margin-top: 14px; line-height: 1.5;
  }

  /* ─── GRID ─── */
  .grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 32px; padding: 36px 40px 64px;
    max-width: 1220px; margin: 0 auto;
  }
  .card { cursor: pointer; transition: transform .3s; }
  .card:hover { transform: translateY(-5px); }
  .card-thumb {
    position: relative; width: 100%; aspect-ratio: 3/2;
    border-radius: 5px; overflow: hidden; background: #ddd;
  }
  .card-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .5s;
  }
  .card:hover .card-thumb img { transform: scale(1.06); }
  .card-play {
    position: absolute; bottom: 10px; right: 10px;
    opacity: .8; transition: all .3s;
  }
  .card:hover .card-play { opacity: 1; transform: scale(1.1); }
  .card-meta {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--sans); font-size: 12px;
    color: var(--text-muted); margin-top: 12px; letter-spacing: .3px;
  }
  .card-title {
    font-size: 19px; font-weight: 600; line-height: 1.35;
    margin-top: 5px; color: var(--text);
  }
  .card-dur {
    font-family: var(--sans); font-size: 13px;
    color: #aaa; margin-top: 3px;
  }

  /* ─── DETAIL ─── */
  .detail { max-width: 860px; margin: 0 auto; padding: 0 40px 64px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--sans); font-size: 13px;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-muted); cursor: pointer;
    background: none; border: none; padding: 24px 0;
    transition: color .3s;
  }
  .back-btn:hover { color: var(--brand); }

  .video-wrap {
    position: relative; width: 100%;
    padding-bottom: 56.25%; /* 16:9 */
    border-radius: 5px; overflow: hidden;
    background: #000;
  }
  .video-wrap iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%; border: 0;
  }

  .detail-title {
    font-size: 34px; font-weight: 700; line-height: 1.22;
    margin-top: 26px;
  }
  .detail-body {
    font-family: var(--sans); font-size: 17px;
    line-height: 1.78; color: #444; margin-top: 18px;
  }
  .detail-body p { margin-bottom: 16px; }

  .detail-credits {
    margin-top: 24px; padding-top: 18px;
    border-top: 1px solid var(--border);
    font-family: var(--sans); font-size: 14px;
    color: var(--text-muted); line-height: 2;
  }
  .detail-credits strong { color: var(--text-light); font-weight: 600; }

  .more-section {
    padding-top: 36px; margin-top: 36px;
    border-top: 1px solid var(--border); clear: both;
  }
  .more-title { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
  .more-grid {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 24px;
  }

  /* ─── FADE ─── */
  .fade-in { animation: fadeUp .45s ease forwards; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center; padding: 32px 24px;
    font-family: var(--sans); font-size: 13px;
    color: #aaa; border-top: 1px solid var(--border);
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1024px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 28px; padding: 32px 28px 56px; }
    .more-grid { grid-template-columns: repeat(2, 1fr); }
    .hero-title { font-size: 42px; }
  }
  @media (max-width: 768px) {
    .nav { padding: 12px 16px; }
    .nav-brand { font-size: 24px; }
    .hero { height: 360px; }
    .hero-title { font-size: 30px; padding: 0 50px; }
    .hero-tag { font-size: 11px; }
    .grid { grid-template-columns: 1fr; gap: 28px; padding: 28px 16px 48px; }
    .more-grid { grid-template-columns: 1fr; }
    .detail { padding: 0 16px 48px; }
    .detail-title { font-size: 26px; }
    .tabs { gap: 20px; font-size: 14px; }
  }
  @media (max-width: 480px) {
    .hero { height: 280px; }
    .hero-title { font-size: 24px; }
    .detail-title { font-size: 22px; }
    .card-title { font-size: 17px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="top">
  <div class="nav-brand" onclick="showHome()">MinBiladi</div>
</nav>

<!-- HOME VIEW -->
<div id="homeView">
  <!-- Hero -->
  <div class="hero" id="heroSection">
    <img class="hero-img" id="heroImg" alt="">
    <div class="hero-overlay" onclick="openFeatured()">
      <span class="hero-tag">Videos</span>
      <h1 class="hero-title" id="heroTitle"></h1>
      <div class="hero-play-btn">
        <svg width="72" height="72" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="23" stroke="#fff" stroke-width="2" fill="rgba(0,0,0,.25)"/>
          <polygon points="19,14 36,24 19,34" fill="#fff"/>
        </svg>
      </div>
    </div>
    <button class="hero-arrow l" onclick="event.stopPropagation();prevHero()">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="hero-arrow r" onclick="event.stopPropagation();nextHero()">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs-wrap">
    <div class="tabs">
      <span class="tab active" onclick="setTab(this)">Latest</span>
      <span class="tab" onclick="setTab(this)">Popular</span>
      <span class="tab" onclick="setTab(this)">Originals</span>
      <span class="tab" onclick="setTab(this)">Exclusives</span>
    </div>
    <p class="tabs-sub">Curated short documentaries and original MinBiladi productions exploring big ideas</p>
  </div>

  <!-- Grid -->
  <div class="grid" id="videoGrid"></div>
</div>

<!-- DETAIL VIEW -->
<div id="detailView" style="display:none;">
  <div class="detail fade-in">
    <button class="back-btn" onclick="showHome()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back to videos
    </button>

    <div class="video-wrap">
      <iframe id="ytPlayer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <h1 class="detail-title" id="detailTitle"></h1>

    <div class="detail-body" id="detailBody"></div>

    <div class="detail-credits" id="detailCredits"></div>

    <div class="more-section">
      <h2 class="more-title">More videos</h2>
      <div class="more-grid" id="moreGrid"></div>
    </div>
  </div>
</div>

<footer class="footer">© 2026 MinBiladi. All rights reserved.</footer>

<script>
const VIDEOS = [
  {
    id: 1,
    title: "The Immune System Explained",
    subtitle: "How your body fights off billions of invaders every day — a journey into bacteria infection",
    category: "Science",
    type: "Video",
    duration: "7 minutes",
    ytId: "CWGvwpS-5g0?list=RDCWGvwpS-5g0",
    thumb: "https://img.youtube.com/vi/zQGOcOUBi6s/maxresdefault.jpg",
    description: [
      "Every second of your life you are under attack. Bacteria, viruses, spores and more want to enter your body and use its resources for themselves. The immune system is a powerful army of cells that fights like a T-Rex on speed and sacrifices itself for your survival.",
      "This animation explores the complex, beautiful and awe-inspiring reality of how your body defends itself. From the first line of defense — your skin — to the intricate dance of macrophages, neutrophils, dendritic cells, and T-cells, this video reveals the hidden war being waged inside you at all times."
    ],
    directors: "Philipp Dettmer",
    producers: "Kurzgesagt"
  },
  {
    id: 2,
    title: "You Are Immune Against Every Disease",
    subtitle: "Your body already has a weapon against every possible disease — even ones that don't exist yet",
    category: "Biology",
    type: "Video",
    duration: "10 minutes",
    ytId: "LmpuerlbJu0",
    thumb: "https://img.youtube.com/vi/LmpuerlbJu0/maxresdefault.jpg",
    description: [
      "You are immune against every disease. Your body is capable of producing a specific weapon against any possible infection — even ones that have never existed and never will. How is this possible?",
      "Deep inside your bones, millions of cells are randomly rearranging their DNA to create billions of unique antibodies. Most of these cells will never be needed, and many are immediately destroyed. But the few that match a real threat become the heroes of your survival. This is the incredible story of adaptive immunity."
    ],
    directors: "Philipp Dettmer",
    producers: "Kurzgesagt"
  },
  {
    id: 3,
    title: "What Happens When You're Sick",
    subtitle: "The invisible battle happening inside your body every time you catch a cold or flu",
    category: "Health",
    type: "Video",
    duration: "11 minutes",
    ytId: "M-K7mxdN62M",
    thumb: "https://img.youtube.com/vi/M-K7mxdN62M/maxresdefault.jpg",
    description: [
      "When you feel sick — the fever, the aches, the fatigue — you might think these symptoms are caused by the disease itself. But in most cases, your symptoms are actually caused by your own immune system fighting back.",
      "This film explores what actually happens when a virus invades your body. From the initial breach to the full-scale immune war, through the sneezing, the inflammation, and the fever — every symptom has a purpose. Understanding the immune response reveals that feeling terrible is actually a sign that your body is doing something incredible."
    ],
    directors: "Philipp Dettmer",
    producers: "Kurzgesagt"
  },
  {
    id: 4,
    title: "The Last Repair Shop",
    subtitle: "Inside the Los Angeles warehouse where craftspeople keep music alive for thousands of students",
    category: "Culture",
    type: "Video",
    duration: "39 minutes",
    ytId: "xttrkgKXtZ4",
    thumb: "https://img.youtube.com/vi/xttrkgKXtZ4/maxresdefault.jpg",
    description: [
      "In a nondescript warehouse in the heart of Los Angeles, a small group of devoted craftspeople maintain over 80,000 musical instruments for the city's public school students. Many of these students come from low-income families, and for them, a school-loaned instrument may be their only access to music.",
      "This Oscar-winning documentary short reveals the deeply personal stories of both the repairers and the students whose lives are transformed by their work. Each instrument carries a history — scratches and dents that tell stories of young musicians finding their voice. The Last Repair Shop is a love letter to the unsung heroes who keep the music playing."
    ],
    directors: "Ben Proudfoot, Kris Bowers",
    producers: "L.A. Times Short Docs, Searchlight Pictures"
  },
  {
    id: 5,
    title: "How The Immune System Works",
    subtitle: "A deeper dive into the most complex biological system in your body",
    category: "Science",
    type: "Video",
    duration: "10 minutes",
    ytId: "lXfEK8G8CUI",
    thumb: "https://img.youtube.com/vi/lXfEK8G8CUI/maxresdefault.jpg",
    description: [
      "The human immune system is the most complex biological system in the body after the brain. It consists of hundreds of tiny and large organs spread throughout the body, trillions of cells, and tens of trillions of proteins communicating constantly.",
      "How does this enormous network coordinate itself? How does it learn, remember, and adapt? This animated exploration goes beyond the basics to reveal the deep architecture of immunity — from the thymus and lymph nodes to the bone marrow — and shows how a system with no central command manages to protect you against an ever-changing world of threats."
    ],
    directors: "Philipp Dettmer",
    producers: "Kurzgesagt"
  },
  {
    id: 6,
    title: "Chasing Time",
    subtitle: "A photographer's 15-year quest to capture the disappearing glaciers of our planet",
    category: "Environment",
    type: "Video",
    duration: "40 minutes",
    ytId: "opNK_ZfiSvw",
    thumb: "https://img.youtube.com/vi/opNK_ZfiSvw/maxresdefault.jpg",
    description: [
      "Photographer James Balog spent 15 years documenting the world's disappearing glaciers through his Extreme Ice Survey project. Using time-lapse cameras placed in some of the most remote and harsh locations on Earth, he captured years of glacial retreat in seconds of footage.",
      "This meditative documentary follows Balog as he brings this monumental project to a close. The images are breathtaking and devastating in equal measure — mountains of ice vanishing before our eyes. Chasing Time is both an artistic achievement and an urgent environmental statement about the reality of climate change."
    ],
    directors: "James Balog",
    producers: "Extreme Ice Survey"
  }
];

let heroIdx = 0;

// ─── SVG helpers ───
function playCircle(s) {
  return `<svg width="${s}" height="${s}" viewBox="0 0 48 48" fill="none">
    <circle cx="24" cy="24" r="23" stroke="#fff" stroke-width="2" fill="rgba(0,0,0,.25)"/>
    <polygon points="19,14 36,24 19,34" fill="#fff"/>
  </svg>`;
}

// ─── RENDER HERO ───
function renderHero() {
  const v = VIDEOS[heroIdx];
  document.getElementById('heroImg').src = v.thumb;
  document.getElementById('heroImg').alt = v.title;
  document.getElementById('heroTitle').textContent = v.title;
}

function nextHero() { heroIdx = (heroIdx + 1) % VIDEOS.length; renderHero(); }
function prevHero() { heroIdx = (heroIdx - 1 + VIDEOS.length) % VIDEOS.length; renderHero(); }
function openFeatured() { openVideo(VIDEOS[heroIdx].id); }

// ─── RENDER GRID ───
function renderGrid() {
  const el = document.getElementById('videoGrid');
  el.innerHTML = VIDEOS.map((v, i) => `
    <div class="card fade-in" style="animation-delay:${i * .07}s" onclick="openVideo(${v.id})">
      <div class="card-thumb">
        <img src="${v.thumb}" alt="${v.title}" loading="lazy">
        <div class="card-play">${playCircle(40)}</div>
      </div>
      <div class="card-meta"><span>${v.type} / ${v.category}</span></div>
      <div class="card-title">${v.title}</div>
      <div class="card-dur">${v.duration}</div>
    </div>
  `).join('');
}

// ─── OPEN VIDEO ───
function openVideo(id) {
  const v = VIDEOS.find(x => x.id === id);
  if (!v) return;

  document.getElementById('homeView').style.display = 'none';
  const dv = document.getElementById('detailView');
  dv.style.display = 'block';

  // Reset fade
  const detail = dv.querySelector('.detail');
  detail.classList.remove('fade-in');
  void detail.offsetWidth;
  detail.classList.add('fade-in');

  document.getElementById('ytPlayer').src =
    `https://www.youtube.com/embed/${v.ytId}?rel=0&modestbranding=1`;

  document.getElementById('detailTitle').textContent = v.subtitle;

  // Body
  const bodyHtml = v.description.map(p => `<p>${p}</p>`).join('');
  document.getElementById('detailBody').innerHTML = bodyHtml;

  document.getElementById('detailCredits').innerHTML = `
    <div><strong>Directors:</strong> ${v.directors}</div>
    <div><strong>Producers:</strong> ${v.producers}</div>
  `;

  // More videos
  const others = VIDEOS.filter(x => x.id !== v.id).slice(0, 3);
  document.getElementById('moreGrid').innerHTML = others.map(o => `
    <div class="card" onclick="openVideo(${o.id})">
      <div class="card-thumb">
        <img src="${o.thumb}" alt="${o.title}" loading="lazy">
        <div class="card-play">${playCircle(36)}</div>
      </div>
      <div class="card-meta"><span>${o.type} / ${o.category}</span></div>
      <div class="card-title" style="font-size:16px">${o.title}</div>
      <div class="card-dur">${o.duration}</div>
    </div>
  `).join('');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── SHOW HOME ───
function showHome() {
  document.getElementById('ytPlayer').src = '';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('homeView').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── TABS ───
function setTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// ─── INIT ───
renderHero();
renderGrid();
</script>
</body>
</html>
